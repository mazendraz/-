    <!-- Locale init: apply saved dir/lang before React hydrates to prevent FOUC -->
    <script>
      try {
        var l = localStorage.getItem("al-assema-locale");
        if (l === "ar") {
          document.documentElement.dir = "rtl";
          document.documentElement.lang = "ar";
        }
      } catch (e) {}
    </script>

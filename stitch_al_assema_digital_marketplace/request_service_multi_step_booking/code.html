<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Service Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "inverse-primary": "#84cfff",

                        "on-error": "#ffffff",
                        "outline": "#70787f",
                        "tertiary-fixed-dim": "#ffb962",
                        "surface-container-low": "#f1f4f8",

                        "surface-dim": "#d8dade",

                        "on-error-container": "#93000a",

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        .shadow-soft {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 0 3px rgba(0, 0, 0, 0.02);
        }
        .shadow-soft-hover:hover {
            box-shadow: 0 8px 30px -4px rgba(0, 0, 0, 0.08), 0 0 4px rgba(0, 0, 0, 0.03);
            transform: translateY(-2px);
        }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md text-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Navbar: Linear/Transactional Intent -> TopNavBar suppressed per "Automatic Suppression" rule -->
<main class="flex-grow flex flex-col items-center justify-center py-stack-xl px-margin-mobile md:px-margin-desktop">
<!-- Wizard Container -->
<div class="w-full max-w-[800px] bg-surface-container-lowest rounded-xl shadow-soft p-stack-lg md:p-stack-xl border border-outline-variant/30">
<!-- Header & Progress -->
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-unit">What type of service do you need?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select a primary category to get started.</p>
</div>
<!-- Progress Indicator -->
<div class="flex items-center justify-center mb-stack-xl">
<div class="flex items-center w-full max-w-[500px]">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md z-10 ring-4 ring-surface-container-lowest">1</div>
<div class="flex-grow h-1 bg-surface-container-highest mx-[-4px]"></div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md z-10 ring-4 ring-surface-container-lowest">2</div>
<div class="flex-grow h-1 bg-surface-container-highest mx-[-4px]"></div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md z-10 ring-4 ring-surface-container-lowest">3</div>
<div class="flex-grow h-1 bg-surface-container-highest mx-[-4px]"></div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md z-10 ring-4 ring-surface-container-lowest">4</div>
</div>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-gutter mb-stack-xl">
<!-- Option 1 -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-outline-variant/50 hover:border-primary hover:bg-surface-bright transition-all shadow-soft-hover group relative overflow-hidden bg-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm group-hover:scale-110 transition-transform">architecture</span>
<span class="font-label-md text-label-md text-on-surface">Architecture</span>
</button>
<!-- Option 2 (Active state demo) -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-primary bg-primary-container/10 transition-all shadow-soft group relative overflow-hidden ring-2 ring-primary/20 ring-offset-2 ring-offset-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm">home_repair_service</span>
<span class="font-label-md text-label-md text-on-surface font-bold">Renovation</span>
<div class="absolute top-3 right-3 text-primary">
<span class="material-symbols-outlined fill text-xl">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-outline-variant/50 hover:border-primary hover:bg-surface-bright transition-all shadow-soft-hover group relative overflow-hidden bg-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm group-hover:scale-110 transition-transform">engineering</span>
<span class="font-label-md text-label-md text-on-surface">Consulting</span>
</button>
<!-- Option 4 -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-outline-variant/50 hover:border-primary hover:bg-surface-bright transition-all shadow-soft-hover group relative overflow-hidden bg-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm group-hover:scale-110 transition-transform">handyman</span>
<span class="font-label-md text-label-md text-on-surface">Maintenance</span>
</button>
<!-- Option 5 -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-outline-variant/50 hover:border-primary hover:bg-surface-bright transition-all shadow-soft-hover group relative overflow-hidden bg-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm group-hover:scale-110 transition-transform">landscape</span>
<span class="font-label-md text-label-md text-on-surface">Landscaping</span>
</button>
<!-- Option 6 -->
<button class="flex flex-col items-center justify-center p-stack-lg rounded-xl border-2 border-outline-variant/50 hover:border-primary hover:bg-surface-bright transition-all shadow-soft-hover group relative overflow-hidden bg-surface-container-lowest">
<span class="material-symbols-outlined text-4xl text-primary mb-stack-sm group-hover:scale-110 transition-transform">format_paint</span>
<span class="font-label-md text-label-md text-on-surface">Interior Design</span>
</button>
</div>
<!-- Trust Message -->
<div class="flex items-center justify-center gap-3 p-4 bg-surface-container-low rounded-lg mb-stack-xl border border-surface-container-high">
<span class="material-symbols-outlined text-secondary">verified_user</span>
<p class="font-label-md text-label-md text-on-surface-variant">All our service providers are vetted and certified professionals.</p>
</div>
<!-- Actions -->
<div class="flex justify-between items-center border-t border-outline-variant/30 pt-stack-md mt-auto">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors py-2 px-4 rounded-lg">
                    Back
                </button>
<button class="bg-primary text-on-primary font-label-md text-label-md py-3 px-8 rounded-lg shadow-sm hover:bg-primary-container hover:text-on-primary-container transition-colors flex items-center gap-2">
                    Continue
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Footer: Linear intent -> Footer suppressed -->
</body></html>
